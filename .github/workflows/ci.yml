name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev,vis]"
          python -m pip check

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy src tests

      - name: Pytest
        run: python -m pytest -q

      - name: CLI smoke
        run: vrptw info

      - name: Streamlit import smoke
        run: python -c "import apps.streamlit_app; print('streamlit import ok')"
