repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: mypy src tests
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: pytest
        name: pytest
        entry: pytest -q
        language: system
        pass_filenames: false
        types_or: [python, pyi]
