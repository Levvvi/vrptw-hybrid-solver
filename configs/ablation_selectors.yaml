seed: 42
ablation:
  name: ablation_selectors
objective:
  vehicle_weight: 100000.0
solver:
  time_limit_sec: 30
  max_iterations: 300
alns:
  selector: uniform
  destroy_fraction_min: 0.05
  destroy_fraction_max: 0.25
  segment_length: 10
  reaction_factor: 0.5
  exploration_floor: 0.05
  temperature: 1.0
  decay: 0.8
  memory_size: 30
  candidate_neighbor_size: 16
  use_pair_memory: true
  use_diversity_bonus: true
  enabled_destroy_operators:
  disabled_destroy_operators: []
  enabled_repair_operators:
  disabled_repair_operators: []
experiment:
  output_dir: data/results/experiments
  runs_csv: data/results/experiments/ablation_selectors.csv
  solution_dir: data/results/experiments/solutions/selectors
  convergence_dir: data/results/experiments/convergence/selectors
  instances:
    - name: mini_solomon
      path: tests/fixtures/mini_solomon.txt
    - name: c101_25
      path: data/raw/solomon/C101_25.txt
    - name: c101_50
      path: data/raw/solomon/C101_100.txt
      limit_customers: 50
  solvers:
    - name: alns_uniform
      solver: alns_uniform
      ablation: alns_uniform
      alns:
        selector: uniform
    - name: alns_roulette
      solver: alns_roulette
      ablation: alns_roulette
      alns:
        selector: roulette
    - name: alns_mosade
      solver: alns_mosade
      ablation: alns_mosade_adaptive
      alns:
        selector: mosade
  seeds: [0, 1, 2, 3, 4]
  time_limits:
    alns: 30
  max_iterations: 300
report:
  summary_csv: data/results/experiments/ablation_selectors_summary.csv
  stat_tests_csv: data/results/experiments/ablation_selectors_stat_tests.csv
  convergence_dir: data/results/experiments/convergence/selectors
  curated_dir: reports/results
  figures_dir: reports/figures
