seed: 42
ablation:
  name: experiment_small
objective:
  vehicle_weight: 100000.0
solver:
  time_limit_sec: 10
  max_iterations: 100
alns:
  selector: uniform
  destroy_fraction_min: 0.05
  destroy_fraction_max: 0.25
  segment_length: 5
  reaction_factor: 0.5
  exploration_floor: 0.05
  temperature: 1.0
  decay: 0.8
  memory_size: 20
  candidate_neighbor_size: 16
  use_pair_memory: true
  use_diversity_bonus: true
  enabled_destroy_operators:
  disabled_destroy_operators: []
  enabled_repair_operators:
  disabled_repair_operators: []
experiment:
  output_dir: data/results/experiments
  runs_csv: data/results/experiments/runs_small.csv
  solution_dir: data/results/experiments/solutions
  convergence_dir: data/results/experiments/convergence
  instances:
    - name: mini_solomon
      path: tests/fixtures/mini_solomon.txt
    - name: c101_25
      path: data/raw/solomon/C101_25.txt
    - name: c101_50
      path: data/raw/solomon/C101_100.txt
      limit_customers: 50
  solvers:
    - name: greedy
      solver: greedy
      ablation: greedy
    - name: ortools_routing
      solver: ortools_routing
      ablation: ortools_routing
    - name: cp_sat
      solver: cp_sat
      ablation: cp_sat_limited
    - name: alns_uniform
      solver: alns_uniform
      ablation: alns_uniform
      alns:
        selector: uniform
    - name: alns_mosade
      solver: alns_mosade
      ablation: alns_mosade_adaptive
      alns:
        selector: mosade
  seeds: [0, 1, 2]
  time_limits:
    cp_sat: 30
    alns: 10
    ortools_routing: 10
  max_iterations: 100
report:
  summary_csv: data/results/experiments/summary_small.csv
  stat_tests_csv: data/results/experiments/stat_tests_small.csv
  figure_dir: reports/figures
