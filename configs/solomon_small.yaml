seed: 42
ablation:
  name: solomon_small
objective:
  vehicle_weight: 100000.0
solver:
  time_limit_sec: 3
  max_iterations: 10
alns:
  selector: uniform
  destroy_fraction_min: 0.05
  destroy_fraction_max: 0.25
  segment_length: 5
  reaction_factor: 0.5
  exploration_floor: 0.05
  temperature: 1.0
  decay: 0.8
  memory_size: 10
  candidate_neighbor_size: 8
  use_pair_memory: true
  use_diversity_bonus: true
  enabled_destroy_operators:
  disabled_destroy_operators: []
  enabled_repair_operators:
  disabled_repair_operators: []
experiment:
  output_dir: data/results/solomon_small
  instances:
    - name: mini_c101_8
      path: tests/fixtures/mini_solomon.txt
      limit_customers: 8
  solvers:
    - name: greedy
      solver: greedy
      ablation: greedy
    - name: alns_uniform
      solver: alns_uniform
      ablation: alns_uniform
      alns:
        selector: uniform
    - name: alns_mosade
      solver: alns_mosade
      ablation: alns_mosade_adaptive
      alns:
        selector: mosade
  seeds: [42]
  time_limit_sec: 3
  max_iterations: 10
